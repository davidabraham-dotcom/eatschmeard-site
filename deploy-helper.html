async function deployAll() {
  addLog('Starting upload of ' + Object.keys(FILES).length + ' files...');
  
  for (const [hash, b64data] of Object.entries(FILES)) {
    try {
      const blob = b64toBlob(b64data);
      const resp = await fetch('https://api.netlify.com/api/v1/deploys/' + DEPLOY_ID + '/files/' + hash, {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + TOKEN,
          'Content-Type': 'application/octet-stream'
        },
        body: blob
      });
      addLog('Uploaded ' + hash.substring(0,8) + '... status: ' + resp.status);
    } catch(e) {
      addLog('ERROR uploading ' + hash.substring(0,8) + ': ' + e.message);
    }
  }
  
  // Check deploy status
  addLog('\nChecking deploy status...');
  const statusResp = await fetch('https://api.netlify.com/api/v1/deploys/' + DEPLOY_ID, {
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });
  const data = await statusResp.json();
  addLog('State: ' + data.state);
  addLog('URL: ' + data.deploy_ssl_url);
  addLog('Required remaining: ' + (data.required ? data.required.length : 0));
  addLog('\nDONE!');
}

deployAll();
</script>
