<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schmear'd — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Genty';
  src: url('fonts/genty.woff2') format('woff2'),
       url('fonts/genty.woff') format('woff');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Genty Sans';
  src: url('fonts/genty-sans.woff2') format('woff2'),
       url('fonts/genty-sans.woff') format('woff');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ======= RESET & BASE ======= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Quicksand', sans-serif;
  background: #fff5e1;
  color: #1a1a2e;
  overflow-x: hidden;
  line-height: 1.6;
}
h1, h2, h3, h4, h5, h6 { font-family: 'Genty Sans', sans-serif; font-weight: 600; }

/* ======= CUSTOM PROPERTIES ======= */
:root {
  --navy: #09308b;
  --blue: #428ce2;
  --blue-light: #84b6ee;
  --cream: #fff5e1;
  --white: #FFFFFF;
  --sage: #96c287;
  --yellow: #fbea57;
  --text-dark: #1a1a2e;
  --text-muted: #5a5a72;
  --radius: 16px;
  --radius-lg: 24px;
  --error: #e74c3c;
  --success: #27ae60;
}

/* ======= LOGIN SCREEN ======= */
.login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  padding: 20px;
}

.login-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(9, 48, 139, 0.15);
}

.login-logo {
  text-align: center;
  margin-bottom: 40px;
}

.login-logo .logo-text {
  font-family: 'Genty', cursive;
  font-size: 2.2rem;
  color: var(--navy);
  letter-spacing: 1px;
}

.login-logo .logo-text span {
  color: var(--yellow);
}

.login-title {
  font-size: 1.5rem;
  color: var(--navy);
  margin-bottom: 32px;
  text-align: center;
}

.form-group {
  margin-bottom: 24px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text-dark);
  font-size: 0.95rem;
}

.form-group input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e0e0e0;
  border-radius: var(--radius);
  font-size: 1rem;
  font-family: 'Quicksand', sans-serif;
  transition: border-color 0.3s;
}

.form-group input:focus {
  outline: none;
  border-color: var(--blue);
}

.btn {
  display: inline-block;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Quicksand', sans-serif;
}

.btn-primary {
  background: var(--navy);
  color: var(--white);
  width: 100%;
}

.btn-primary:hover {
  background: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(9, 48, 139, 0.3);
}

.btn-secondary {
  background: var(--cream);
  color: var(--navy);
  border: 2px solid var(--navy);
}

.btn-secondary:hover {
  background: var(--navy);
  color: var(--white);
}

.btn-small {
  padding: 8px 16px;
  font-size: 0.9rem;
}

.btn-danger {
  background: var(--error);
  color: var(--white);
}

.btn-danger:hover {
  background: #c0392b;
}

.btn-success {
  background: var(--success);
  color: var(--white);
}

.btn-success:hover {
  background: #229954;
}

.login-error {
  color: var(--error);
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

/* ======= DASHBOARD ======= */
.dashboard {
  display: none;
  min-height: 100vh;
  background: var(--cream);
}

.dashboard.active {
  display: flex;
  flex-direction: column;
}

.dashboard-header {
  background: var(--white);
  border-bottom: 1px solid #e0e0e0;
  padding: 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
}

.dashboard-header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
}

.dashboard-title {
  font-size: 1.5rem;
  color: var(--navy);
}

.dashboard-title .logo {
  font-family: 'Genty', cursive;
  font-size: 1.8rem;
  margin-right: 20px;
}

.dashboard-title .logo span {
  color: var(--yellow);
}

.header-actions {
  display: flex;
  gap: 16px;
  align-items: center;
}

.btn-logout {
  background: var(--error);
  color: var(--white);
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  cursor: pointer;
  font-family: 'Quicksand', sans-serif;
  transition: all 0.3s;
}

.btn-logout:hover {
  background: #c0392b;
}

.dashboard-content {
  flex: 1;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
  padding: 40px 24px;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  border-bottom: 2px solid #e0e0e0;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 12px 20px;
  border: none;
  background: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-muted);
  font-family: 'Quicksand', sans-serif;
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
  margin-bottom: -2px;
}

.tab-btn:hover {
  color: var(--navy);
}

.tab-btn.active {
  color: var(--navy);
  border-bottom-color: var(--navy);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ======= CARDS & LAYOUT ======= */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  border: 1px solid #f0f0f0;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
  margin-bottom: 32px;
}

.product-card {
  position: relative;
}

.product-card.sold-out {
  opacity: 0.6;
}

.sold-out-badge {
  position: absolute;
  top: -12px;
  right: 16px;
  background: var(--error);
  color: var(--white);
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.product-name {
  font-size: 1.3rem;
  color: var(--navy);
  margin-bottom: 8px;
}

.product-subtitle {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.product-price {
  font-size: 1.1rem;
  color: var(--blue);
  font-weight: 700;
  margin-bottom: 16px;
}

.product-quantity {
  margin-bottom: 16px;
}

.quantity-label {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: block;
}

.quantity-display {
  font-size: 1.8rem;
  color: var(--navy);
  font-weight: 700;
  margin-bottom: 12px;
}

.quantity-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.qty-btn {
  padding: 8px 12px;
  border: 1px solid var(--blue);
  background: var(--white);
  color: var(--blue);
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
}

.qty-btn:hover {
  background: var(--blue);
  color: var(--white);
}

.qty-input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.qty-input-group input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #e0e0e0;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: 'Quicksand', sans-serif;
}

.qty-input-group button {
  padding: 8px 16px;
  background: var(--blue);
  color: var(--white);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 600;
  font-family: 'Quicksand', sans-serif;
  transition: all 0.3s;
}

.qty-input-group button:hover {
  background: var(--navy);
}

/* ======= FORMS & TABLES ======= */
.form-section {
  margin-bottom: 32px;
}

.form-section h3 {
  color: var(--navy);
  margin-bottom: 20px;
  font-size: 1.2rem;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e0e0e0;
  border-radius: var(--radius);
  font-size: 0.95rem;
  font-family: 'Quicksand', sans-serif;
  transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(66, 140, 226, 0.1);
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.toggle-switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 28px;
  margin-top: 8px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: 0.4s;
  border-radius: 28px;
}

.toggle-slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: 0.4s;
  border-radius: 50%;
}

input:checked + .toggle-slider {
  background-color: var(--success);
}

input:checked + .toggle-slider:before {
  transform: translateX(22px);
}

.table-responsive {
  overflow-x: auto;
  margin-bottom: 24px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
}

table th {
  background: #f8f8f8;
  padding: 16px;
  text-align: left;
  font-weight: 600;
  color: var(--navy);
  border-bottom: 2px solid #e0e0e0;
}

table td {
  padding: 14px 16px;
  border-bottom: 1px solid #f0f0f0;
}

table tr:hover {
  background: #fafafa;
}

.status-badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-pending {
  background: #fff3cd;
  color: #856404;
}

.status-paid {
  background: #d4edda;
  color: #155724;
}

.status-ready {
  background: #cce5ff;
  color: #004085;
}

.status-picked_up {
  background: #d4edda;
  color: #155724;
}

.status-cancelled {
  background: #f8d7da;
  color: #721c24;
}

.order-expandable {
  cursor: pointer;
  user-select: none;
}

.order-expandable:hover {
  background: #f0f0f0;
}

.order-details {
  display: none;
}

.order-details.expanded {
  display: table-row;
  background: #f8f8f8;
}

.order-details td {
  padding: 20px 16px;
}

.order-items-list {
  list-style: none;
  padding: 0;
  margin: 0 0 16px 0;
}

.order-items-list li {
  padding: 8px 0;
  border-bottom: 1px solid #e0e0e0;
}

.order-items-list li:last-child {
  border-bottom: none;
}

/* ======= MODALS & OVERLAYS ======= */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  animation: fadeIn 0.3s ease;
}

.modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background-color: var(--white);
  padding: 32px;
  border-radius: var(--radius-lg);
  max-width: 500px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.modal-header {
  margin-bottom: 24px;
}

.modal-title {
  font-size: 1.3rem;
  color: var(--navy);
  margin: 0;
}

.modal-body {
  margin-bottom: 24px;
}

.modal-footer {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

/* ======= TOAST NOTIFICATIONS ======= */
.toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2000;
  max-width: 400px;
}

.toast {
  background: var(--white);
  padding: 16px 20px;
  border-radius: var(--radius);
  margin-bottom: 12px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  animation: slideInRight 0.3s ease;
  border-left: 4px solid var(--blue);
  display: flex;
  align-items: center;
  gap: 12px;
}

.toast.success {
  border-left-color: var(--success);
}

.toast.error {
  border-left-color: var(--error);
}

.toast-message {
  flex: 1;
  font-weight: 500;
  color: var(--text-dark);
}

@keyframes slideInRight {
  from {
    transform: translateX(400px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

/* ======= EMPTY STATE ======= */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 4rem;
  margin-bottom: 16px;
}

.empty-state-title {
  font-size: 1.3rem;
  color: var(--navy);
  margin-bottom: 8px;
}

/* ======= LOADING ======= */
.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--blue);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ======= RESPONSIVE ======= */
@media (max-width: 768px) {
  .dashboard-header-inner {
    flex-direction: column;
    align-items: flex-start;
  }

  .card-grid {
    grid-template-columns: 1fr;
  }

  .form-row {
    grid-template-columns: 1fr;
  }

  .table-responsive {
    font-size: 0.85rem;
  }

  table th, table td {
    padding: 12px 8px;
  }

  .tabs {
    gap: 4px;
  }

  .tab-btn {
    padding: 10px 16px;
    font-size: 0.9rem;
  }

  .toast-container {
    max-width: calc(100% - 48px);
  }

  .modal-content {
    max-width: 90%;
    padding: 24px;
  }
}

@media (max-width: 480px) {
  .login-card {
    padding: 32px 24px;
  }

  .dashboard-content {
    padding: 20px 16px;
  }

  .card {
    padding: 16px;
  }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-container" id="loginContainer">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-text">schmear<span>.</span>d</div>
    </div>
    <h2 class="login-title">Admin Dashboard</h2>
    <div id="loginError" class="login-error" style="display: none;"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password">Admin Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter admin password"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dashboard-header">
    <div class="dashboard-header-inner">
      <div class="dashboard-title">
        <span class="logo">schmear<span>.</span>d</span>
        Admin Dashboard
      </div>
      <div class="header-actions">
        <div id="lastSync" style="font-size: 0.85rem; color: var(--text-muted);">
          Last sync: never
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="dashboard-content">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('inventory')">Inventory</button>
      <button class="tab-btn" onclick="switchTab('schedule')">Pickup Schedule</button>
      <button class="tab-btn" onclick="switchTab('location')">Pickup Location</button>
      <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
      <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
    </div>

    <!-- INVENTORY TAB -->
    <div id="inventory" class="tab-content active">
      <div class="card-grid" id="productsGrid"></div>
    </div>

    <!-- SCHEDULE TAB -->
    <div id="schedule" class="tab-content">
      <div class="card">
        <h2>Pickup Schedule</h2>
        <div style="margin: 24px 0;">
          <button class="btn btn-primary" onclick="openAddSlotModal()" style="margin-bottom: 24px;">
            + Add Pickup Slot
          </button>
        </div>
        <div id="scheduleList"></div>
      </div>
    </div>

    <!-- LOCATION TAB -->
    <div id="location" class="tab-content">
      <div class="card">
        <h2>Pickup Location</h2>
        <form id="locationForm" onsubmit="saveLocation(event)" style="margin-top: 24px;">
          <div class="form-row">
            <div class="form-group">
              <label for="address1">Address Line 1</label>
              <input type="text" id="address1" placeholder="Street address" required />
            </div>
            <div class="form-group">
              <label for="address2">Address Line 2</label>
              <input type="text" id="address2" placeholder="Apt, suite, etc (optional)" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" placeholder="City" required />
            </div>
            <div class="form-group">
              <label for="state">State</label>
              <input type="text" id="state" placeholder="State" required maxlength="2" />
            </div>
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input type="text" id="zip" placeholder="ZIP code" required maxlength="5" />
            </div>
          </div>
          <div class="form-group">
            <label for="instructions">Special Instructions</label>
            <textarea id="instructions" placeholder="Any special pickup instructions for customers"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="max-width: 300px;">Save Location</button>
        </form>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="orders" class="tab-content">
      <div class="card">
        <h2>Orders</h2>
        <div id="orderStats" style="display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; padding: 16px; background: #f0f4ff; border-radius: 10px;"></div>
        <div style="margin: 20px 0; display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="tab-btn" onclick="filterOrders('all')" style="border: none; background: none; padding: 8px 16px;">All</button>
          <button class="tab-btn" onclick="filterOrders('pending')" style="border: none; background: none; padding: 8px 16px;">Pending</button>
          <button class="tab-btn" onclick="filterOrders('paid')" style="border: none; background: none; padding: 8px 16px;">Paid</button>
          <button class="tab-btn" onclick="filterOrders('ready')" style="border: none; background: none; padding: 8px 16px;">Ready</button>
          <button class="tab-btn" onclick="filterOrders('picked_up')" style="border: none; background: none; padding: 8px 16px;">Picked Up</button>
          <button class="tab-btn" onclick="filterOrders('cancelled')" style="border: none; background: none; padding: 8px 16px;">Cancelled</button>
        </div>
        <div class="table-responsive">
          <table id="ordersTable">
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Items</th>
                <th>Total</th>
                <th>Pickup Slot</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="settings" class="tab-content">
      <div class="card">
        <div class="form-section">
          <h3>Store Status</h3>

async function adjustQuantity(productId, delta) {
  const product = allProducts.find(p => p.id === productId);
  if (!product) return;

  const newQty = Math.max(0, product.quantity_available + delta);
  await updateProductQuantity(productId, newQty);
}

async function setQuantity(productId) {
  const input = document.getElementById(`set-${productId}`);
  const qty = parseInt(input.value, 10);

  if (isNaN(qty) || qty < 0) {
    showToast('Please enter a valid quantity', 'error');
    return;
  }

  await updateProductQuantity(productId, qty);
  input.value = '';
}

async function updateProductQuantity(productId, newQty) {
  try {
    const { error } = await supabase
      .from('products')
      .update({ quantity_available: newQty })
      .eq('id', productId);

    if (error) throw error;

    // Update local state
    const product = allProducts.find(p => p.id === productId);
    if (product) product.quantity_available = newQty;

    renderProducts();
    showToast('Quantity updated', 'success');
  } catch (err) {
    console.error('Error updating quantity:', err);
    showToast('Error updating quantity', 'error');
  }
}

function renderSchedule() {
  const list = document.getElementById('scheduleList');

  if (allPickupSlots.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-title">No pickup slots scheduled</div></div>';
    return;
  }

  // Group by date
  const grouped = {};
  allPickupSlots.forEach(slot => {
    if (!grouped[slot.pickup_date]) grouped[slot.pickup_date] = [];
    grouped[slot.pickup_date].push(slot);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(date => {
    const dateStr = new Date(date).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    html += `<div style="margin-bottom: 24px;">
      <h4 style="color: var(--navy); margin-bottom: 12px;">${dateStr}</h4>`;

    grouped[date].forEach(slot => {
      const utilized = `${slot.current_orders}/${slot.max_orders}`;
      html += `
        <div style="background: #f8f8f8; padding: 16px; border-radius: var(--radius); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <strong>${slot.start_time.substring(0, 5)} - ${slot.end_time.substring(0, 5)}</strong>
            <span style="color: var(--text-muted); margin-left: 16px;">Orders: ${utilized}</span>
          </div>
          <div style="display: flex; gap: 12px;">
            <label class="toggle-switch" style="margin: 0;">
              <input
                type="checkbox"
                ${slot.is_active ? 'checked' : ''}
                onchange="toggleSlot(${slot.id}, this.checked)"
              />
              <span class="toggle-slider"></span>
            </label>
            <button class="btn btn-danger btn-small" onclick="deleteSlot(${slot.id})">Delete</button>
          </div>
        </div>
      `;
    });
    html += '</div>';
  });

  list.innerHTML = html;
}

      <div style="flex:1; min-width:120px; text-align:center;">

      </div>
      <div style="flex:1; min-width:120px; text-align:center;">
        <div style="font-size:1.8rem; font-weight:800; color:#f0ad4e;">${pendingCount}</div>
        <div style="font-size:0.8rem; color:#5a5a72;">Pending</div>

        <div style="font-size:0.8rem; color:#5a5a72;">Paid</div>
      </div>
      <div style="flex:1; min-width:120px; text-align:center;">

    `;
  }

  const filtered = currentOrderFilter === 'all'

    tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">No orders found</td></tr>';

  filtered.forEach((order, idx) => {

    tr.innerHTML = `

          <option value="ready" ${order.order_status === 'ready' ? 'selected' : ''}>Ready</option>

          <option value="cancelled" ${order.order_status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
        </select>
      </td>
    `;

    tbody.appendChild(tr);

    // Add details row
    const detailsRow = document.createElement('tr');
    detailsRow.className = `order-details`;
    detailsRow.id = `details-${idx}`;
    detailsRow.innerHTML = `
      <td colspan="9" style="padding: 20px;">
        <strong>Order Items:</strong>
        <ul class="order-items-list">
          ${items.map(i => `<li>${i.quantity}x ${i.products?.name || 'Item'} @ $${parseFloat(i.unit_price).toFixed(2)}</li>`).join('')}

        <strong>Stripe Payment Intent ID:</strong> ${order.stripe_payment_intent_id || 'N/A'}<br>
        <strong>Stripe Checkout Session ID:</strong> ${order.stripe_checkout_session_id || 'N/A'}
      </td>
    `;
    tbody.appendChild(detailsRow);
  });

// ============ TAB SWITCHING ============
function switchTab(tabName) {
  // Hide all tabs
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
  });

  // Deactivate all buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });

  // Show selected tab
  const tab = document.getElementById(tabName);
  if (tab) tab.classList.add('active');

  // Activate button
  event.target.classList.add('active');
}

// ============ TOAST NOTIFICATIONS ============
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-message">${escapeHtml(message)}</span>`;

  container.appendChild(toast);

  // Auto remove after 4 seconds
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(400px)';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ============ UTILITY FUNCTIONS ============
function escapeHtml(unsafe) {
  return unsafe
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Close modals when clicking outside
window.onclick = function(event) {
  const modal = document.getElementById('addSlotModal');
  if (event.target === modal) {
    closeAddSlotModal();
  }
};
</script>
